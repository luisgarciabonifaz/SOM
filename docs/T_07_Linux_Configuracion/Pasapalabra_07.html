<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasapalabra Linux - Configuración Básica</title>
    <style>
        :root {
            --blue-main: #0047ab;
            --green-success: #2ecc71;
            --red-error: #e74c3c;
            --yellow-waiting: #f1c40f;
            --bg-color: #f0f2f5;
            --text-color: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
        }

        header {
            margin-bottom: 20px;
        }

        h1 {
            color: var(--blue-main);
            margin-bottom: 5px;
        }

        .game-info {
            display: flex;
            justify-content: space-around;
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* El Rosco */
        .rosco-container {
            position: relative;
            width: 350px;
            height: 350px;
            margin: 40px auto;
        }

        .letter {
            position: absolute;
            width: 35px;
            height: 35px;
            background: var(--blue-main);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 14px;
            transition: all 0.3s ease;
            border: 2px solid white;
        }

        .letter.current {
            transform: scale(1.3);
            box-shadow: 0 0 15px var(--blue-main);
            z-index: 10;
        }

        .letter.success { background-color: var(--green-success); }
        .letter.error { background-color: var(--red-error); }
        .letter.waiting { background-color: var(--blue-main); }

        /* Pregunta y Controles */
        .question-box {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-top: 20px;
            min-height: 150px;
        }

        .letter-hint {
            font-size: 1.5rem;
            color: var(--blue-main);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .definition {
            font-size: 1.1rem;
            line-height: 1.4;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        input[type="text"] {
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            width: 200px;
            outline: none;
        }

        input[type="text"]:focus {
            border-color: var(--blue-main);
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: opacity 0.2s;
        }

        .btn-send { background-color: var(--green-success); color: white; }
        .btn-pasapalabra { background-color: var(--yellow-waiting); color: #333; }
        
        button:hover { opacity: 0.9; }

        /* Pantalla Final */
        #end-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.95);
            z-index: 100;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .result-score {
            font-size: 3rem;
            color: var(--blue-main);
            margin: 20px 0;
        }

        @media (max-width: 500px) {
            .rosco-container { width: 280px; height: 280px; }
            .letter { width: 28px; height: 28px; font-size: 11px; }
            input[type="text"] { width: 120px; }
        }
    </style>
</head>
<body>

<div class="container" id="game-container">
    <header>
        <h1>Pasapalabra Linux</h1>
        <p>Configuración, Usuarios y Sistemas de Archivos</p>
    </header>

    <div class="game-info">
        <div id="timer">Tiempo: 300</div>
        <div id="score">Aciertos: 0</div>
        <div id="errors">Errores: 0</div>
    </div>

    <div class="rosco-container" id="rosco">
        <!-- Las letras se generarán con JS -->
    </div>

    <div class="question-box">
        <div id="hint-text" class="letter-hint">Empieza por A</div>
        <p id="definition-text" class="definition">Cargando definición...</p>
        
        <div class="input-group">
            <input type="text" id="answer-input" placeholder="Escribe tu respuesta..." autocomplete="off">
            <button class="btn-send" id="btn-submit">Enviar</button>
            <button class="btn-pasapalabra" id="btn-pasapalabra">Pasapalabra</button>
        </div>
    </div>
</div>

<div id="end-screen">
    <h1>¡Juego Terminado!</h1>
    <div class="result-score" id="final-score">0</div>
    <p id="final-message">Has completado el rosco de Linux.</p>
    <button onclick="location.reload()" style="background: var(--blue-main); color: white;">Jugar de nuevo</button>
</div>

<script>
    // Datos del juego basados en el documento proporcionado
    const questions = [
        { letter: 'A', answer: 'apt', status: 0, hint: 'Empieza por A', question: 'Gestor de paquetes usado en Debian y Ubuntu para instalar software.' },
        { letter: 'B', answer: 'backup', status: 0, hint: 'Contiene la B', question: 'Copia de seguridad fundamental para no perder datos en caso de fallo.' },
        { letter: 'C', answer: 'cron', status: 0, hint: 'Empieza por C', question: 'Demonio que se encarga de ejecutar tareas programadas en horarios específicos.' },
        { letter: 'D', answer: 'dnf', status: 0, hint: 'Empieza por D', question: 'Gestor de paquetes moderno utilizado en la distribución Fedora.' },
        { letter: 'E', answer: 'ext4', status: 0, hint: 'Contiene la E', question: 'Sistema de archivos Linux muy común, sucesor de ext3.' },
        { letter: 'F', answer: 'fsck', status: 0, hint: 'Empieza por F', question: 'Comando que se usa para comprobar y reparar errores en un sistema de archivos.' },
        { letter: 'G', answer: 'gnome', status: 0, hint: 'Empieza por G', question: 'Entorno de escritorio moderno y minimalista, por defecto en Ubuntu.' },
        { letter: 'H', answer: 'home', status: 0, hint: 'Contiene la H', question: 'Directorio donde se encuentran las carpetas personales de los usuarios.' },
        { letter: 'I', answer: 'id', status: 0, hint: 'Empieza por I', question: 'Comando para ver tu UID (User ID) y los grupos a los que perteneces.' },
        { letter: 'J', answer: 'job', status: 0, hint: 'Contiene la J', question: 'Nombre que reciben las tareas gestionadas por cron (cron ____).' },
        { letter: 'K', answer: 'kde', status: 0, hint: 'Empieza por K', question: 'Entorno de escritorio Plasma altamente personalizable y visualmente atractivo.' },
        { letter: 'L', answer: 'lsblk', status: 0, hint: 'Empieza por L', question: 'Comando para ver un árbol de discos, particiones y sistemas de archivos.' },
        { letter: 'M', answer: 'mount', status: 0, hint: 'Empieza por M', question: 'Comando que asocia un dispositivo físico con un directorio del sistema.' },
        { letter: 'N', answer: 'network', status: 0, hint: 'Contiene la N', question: 'Opción del modo recuperación para activar la red.' },
        { letter: 'O', answer: 'root', status: 0, hint: 'Contiene la O', question: 'Superusuario con todos los permisos del sistema.' },
        { letter: 'P', answer: 'passwd', status: 0, hint: 'Empieza por P', question: 'Fichero que contiene información de las cuentas de usuario (UID, GID, etc).' },
        { letter: 'Q', answer: 'mkfs', status: 0, hint: 'Contiene la Q', question: 'Comando que permite formatear una partición (MaKe FileSystem).' },
        { letter: 'R', answer: 'rsync', status: 0, hint: 'Empieza por R', question: 'Herramienta eficiente para sincronizar archivos y realizar backups incrementales.' },
        { letter: 'S', answer: 'shadow', status: 0, hint: 'Empieza por S', question: 'Fichero que contiene las contraseñas cifradas y solo es legible por root.' },
        { letter: 'T', answer: 'tar', status: 0, hint: 'Empieza por T', question: 'Comando que empaqueta múltiples archivos y carpetas en un solo archivo.' },
        { letter: 'U', answer: 'ubuntu', status: 0, hint: 'Empieza por U', question: 'Distribución Linux muy popular basada en Debian.' },
        { letter: 'V', answer: 'verbose', status: 0, hint: 'Empieza por V', question: 'Modo detallado (opción -v en tar) que muestra los archivos procesados.' },
        { letter: 'X', answer: 'xfce', status: 0, hint: 'Empieza por X', question: 'Entorno de escritorio ligero y rápido, ideal para máquinas antiguas.' },
        { letter: 'Y', answer: 'yum', status: 0, hint: 'Empieza por Y', question: 'Gestor de paquetes clásico de Red Hat, antecesor de dnf.' },
        { letter: 'Z', answer: 'gzip', status: 0, hint: 'Contiene la Z', question: 'Algoritmo de compresión usado frecuentemente junto al comando tar.' }
    ];

    let currentIndex = 0;
    let timeLeft = 300;
    let score = 0;
    let errors = 0;
    let timerId = null;
    let gameEnded = false;

    // Inicializar Rosco
    function initRosco() {
        const rosco = document.getElementById('rosco');
        const total = questions.length;
        const radius = 150; // radio del círculo

        questions.forEach((q, i) => {
            const angle = (i * 2 * Math.PI / total) - (Math.PI / 2);
            const x = Math.cos(angle) * radius + 150;
            const y = Math.sin(angle) * radius + 150;

            const div = document.createElement('div');
            div.id = `letter-${i}`;
            div.className = 'letter';
            div.style.left = `${x}px`;
            div.style.top = `${y}px`;
            div.textContent = q.letter;
            rosco.appendChild(div);
        });
        updateCurrentQuestion();
    }

    // Actualizar pregunta actual
    function updateCurrentQuestion() {
        if (gameEnded) return;

        // Buscar la siguiente pendiente
        let start = currentIndex;
        while (questions[currentIndex].status !== 0) {
            currentIndex = (currentIndex + 1) % questions.length;
            if (currentIndex === start) {
                endGame();
                return;
            }
        }

        // Actualizar UI
        const q = questions[currentIndex];
        document.getElementById('hint-text').textContent = q.hint;
        document.getElementById('definition-text').textContent = q.question;
        document.getElementById('answer-input').value = '';
        document.getElementById('answer-input').focus();

        // Actualizar estilos rosco
        document.querySelectorAll('.letter').forEach((el, idx) => {
            el.classList.remove('current');
            if (idx === currentIndex) el.classList.add('current');
        });
    }

    function checkAnswer() {
        const input = document.getElementById('answer-input').value.toLowerCase().trim();
        if (!input) return;

        const q = questions[currentIndex];
        const letterEl = document.getElementById(`letter-${currentIndex}`);

        if (input === q.answer.toLowerCase()) {
            q.status = 1; // Acierto
            score++;
            letterEl.classList.add('success');
            document.getElementById('score').textContent = `Aciertos: ${score}`;
        } else {
            q.status = 2; // Error
            errors++;
            letterEl.classList.add('error');
            document.getElementById('errors').textContent = `Errores: ${errors}`;
        }

        nextQuestion();
    }

    function nextQuestion() {
        const pending = questions.filter(q => q.status === 0).length;
        if (pending === 0) {
            endGame();
        } else {
            currentIndex = (currentIndex + 1) % questions.length;
            updateCurrentQuestion();
        }
    }

    function pasapalabra() {
        currentIndex = (currentIndex + 1) % questions.length;
        updateCurrentQuestion();
    }

    function startTimer() {
        timerId = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').textContent = `Tiempo: ${timeLeft}`;
            if (timeLeft <= 0) {
                endGame();
            }
        }, 1000);
    }

    function endGame() {
        gameEnded = true;
        clearInterval(timerId);
        document.getElementById('end-screen').style.display = 'flex';
        document.getElementById('final-score').textContent = `${score} / ${questions.length}`;
        
        let msg = "";
        if (score === questions.length) msg = "¡Excelente! Eres un experto en administración Linux.";
        else if (score > 15) msg = "¡Muy bien! Tienes bases sólidas de configuración de sistemas.";
        else msg = "Buen intento. Sigue repasando los comandos de Linux.";
        
        document.getElementById('final-message').textContent = msg;
    }

    // Eventos
    document.getElementById('btn-submit').onclick = checkAnswer;
    document.getElementById('btn-pasapalabra').onclick = pasapalabra;
    document.getElementById('answer-input').onkeypress = (e) => {
        if (e.key === 'Enter') checkAnswer();
    };

    // Iniciar
    window.onload = () => {
        initRosco();
        startTimer();
    };
</script>

</body>
</html>
